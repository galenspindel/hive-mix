name: Agent Involvement Labeler

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  issues: write
  contents: read

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Detect and label agent involvement
        uses: actions/github-script@v7
        with:
          script: |
            const OPT_OUT_LABEL = 'agent-detect:skip';
            const COMMENT_MARKER = '<!-- agent-autodetect -->';

            const AGENTS = [
              {
                label: 'agent:claude',
                patterns: [
                  /co-authored-by:.*claude/i,
                  /co-authored-by:.*noreply@anthropic\.com/i,
                  /co-authored-by:.*claude\[bot\]/i,
                ],
              },
              {
                label: 'agent:copilot',
                patterns: [
                  /co-authored-by:.*github copilot/i,
                  /co-authored-by:.*github-copilot\[bot\]/i,
                  /co-authored-by:.*175728472\+github-copilot/i,
                ],
              },
              {
                label: 'agent:codex',
                patterns: [
                  /co-authored-by:.*openai codex/i,
                  /co-authored-by:.*codex/i,
                  /co-authored-by:.*openai-codex\[bot\]/i,
                ],
              },
            ];

            const { owner, repo } = context.repo;
            const prNumber = context.payload.pull_request.number;

            // Check for opt-out label
            const { data: currentLabels } = await github.rest.issues.listLabelsOnIssue({
              owner, repo, issue_number: prNumber,
            });
            const labelNames = currentLabels.map(l => l.name);

            if (labelNames.includes(OPT_OUT_LABEL)) {
              console.log('Opt-out label present, skipping detection.');
              return;
            }

            // Fetch all commits on the PR
            const { data: commits } = await github.rest.pulls.listCommits({
              owner, repo, pull_number: prNumber, per_page: 100,
            });

            // Collect all commit message text to scan
            const commitText = commits
              .map(c => c.commit.message)
              .join('\n');

            // Also check PR author for bot accounts
            const prAuthorLogin = context.payload.pull_request.user.login;

            // Determine which agent labels to add
            const labelsToAdd = [];

            for (const agent of AGENTS) {
              if (labelNames.includes(agent.label)) {
                // Already labeled, skip
                continue;
              }

              const detected =
                agent.patterns.some(p => p.test(commitText)) ||
                agent.patterns.some(p => p.test(prAuthorLogin));

              if (detected) {
                labelsToAdd.push(agent.label);
              }
            }

            if (labelsToAdd.length === 0) {
              console.log('No new agent involvement detected.');
              return;
            }

            // Ensure labels exist in the repo before applying
            const LABEL_COLORS = {
              'agent:claude':  'f4a261',
              'agent:copilot': '6e40c9',
              'agent:codex':   '2ea44f',
              'agent-detect:skip': 'ededed',
            };

            for (const labelName of [...labelsToAdd, OPT_OUT_LABEL]) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: labelName });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner,
                    repo,
                    name: labelName,
                    color: LABEL_COLORS[labelName] ?? 'cccccc',
                  });
                }
              }
            }

            // Apply the labels
            await github.rest.issues.addLabels({
              owner, repo, issue_number: prNumber,
              labels: labelsToAdd,
            });
            console.log(`Added labels: ${labelsToAdd.join(', ')}`);

            // Find existing autodetect comment to update, or post a new one
            const { data: comments } = await github.rest.issues.listComments({
              owner, repo, issue_number: prNumber, per_page: 100,
            });
            const existing = comments.find(c =>
              c.body.includes(COMMENT_MARKER) &&
              c.user.login === 'github-actions[bot]'
            );

            const labelList = labelsToAdd.map(l => `\`${l}\``).join(', ');
            const body = `${COMMENT_MARKER}
            **Agent involvement auto-detected** — added label(s): ${labelList}

            These were added based on \`Co-Authored-By\` signatures in commits. To suppress future auto-detection on this PR, add the \`${OPT_OUT_LABEL}\` label. You can also remove any label manually — it won't be re-added.`;

            if (existing) {
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner, repo, issue_number: prNumber, body,
              });
            }
